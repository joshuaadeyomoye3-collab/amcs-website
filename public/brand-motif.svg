<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <radialGradient id="glowGold" cx="82%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#e8a020" stop-opacity="0.28" />
      <stop offset="60%" stop-color="#e8a020" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#e8a020" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowGreen" cx="12%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#7bd494" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#7bd494" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- soft color glows for a gradient-mesh feel -->
  <rect width="1440" height="900" fill="url(#glowGold)" />
  <rect width="1440" height="900" fill="url(#glowGreen)" />

  <!-- growth ripples (bottom-right) -->
  <g stroke="#ffffff" stroke-opacity="0.06" fill="none" stroke-width="2">
    <circle cx="1210" cy="770" r="140" />
    <circle cx="1210" cy="770" r="250" />
    <circle cx="1210" cy="770" r="370" />
    <circle cx="1210" cy="770" r="500" />
    <circle cx="1210" cy="770" r="640" />
  </g>

  <!-- balancing ripples (top-left) -->
  <g stroke="#e8a020" stroke-opacity="0.07" fill="none" stroke-width="2">
    <circle cx="120" cy="120" r="90" />
    <circle cx="120" cy="120" r="180" />
    <circle cx="120" cy="120" r="280" />
  </g>

  <!-- floating coins -->
  <g fill="#e8a020" fill-opacity="0.10">
    <circle cx="320" cy="220" r="26" />
    <circle cx="980" cy="160" r="18" />
    <circle cx="1140" cy="360" r="34" />
    <circle cx="540" cy="640" r="22" />
    <circle cx="200" cy="560" r="30" />
  </g>
  <g fill="#ffffff" fill-opacity="0.06">
    <circle cx="760" cy="300" r="14" />
    <circle cx="430" cy="430" r="10" />
    <circle cx="1020" cy="620" r="20" />
  </g>

  <!-- upward growth curve -->
  <path d="M -40 760 C 260 700, 420 600, 660 560 S 1080 420, 1500 220"
        stroke="#e8a020" stroke-opacity="0.16" stroke-width="3" stroke-linecap="round" fill="none" />
  <path d="M -40 860 C 300 820, 520 740, 820 700 S 1180 560, 1500 420"
        stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" stroke-linecap="round" fill="none" />
</svg>
